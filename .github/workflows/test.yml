# Terraform Provider testing workflow.
name: Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - ".github/workflows/release.yml"
      - ".goreleaser.yml"
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - ".github/workflows/release.yml"
      - ".goreleaser.yml"

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read

# Default values to simplify job configurations below.
env:
  # Ensure local go.work does not affect CI.
  GOWORK: off

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go build -v .

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod tidy
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference after 'go mod tidy'. Run 'go mod tidy' and commit."; exit 1)

      - name: Ensure gocmlclient is published
        run: |
          set -euo pipefail
          if rg -n 'github.com/rschmied/gocmlclient/pkg/(client|models|errors)' go.mod >/dev/null; then
            # If these packages are referenced, then a published gocmlclient version must provide them.
            # With GOWORK=off, this must resolve via go.mod alone.
            if ! go list -m -json github.com/rschmied/gocmlclient >/dev/null 2>&1; then
              echo "ERROR: gocmlclient module not resolvable"; exit 1;
            fi
          fi

      - name: Block local-only replaces
        run: |
          if grep -nE '^replace\s+github.com/rschmied/gocmlclient\s+=>\s+\.{0,2}/' go.mod >/dev/null; then
            echo "ERROR: go.mod contains a local path replace for gocmlclient."
            echo "Use go.work for local development instead."
            exit 1
          fi

      - name: Ensure no go.work committed
        run: |
          if test -f go.work; then
            echo "ERROR: go.work exists in the repository checkout.";
            echo "go.work must not be committed; use go.work.example locally.";
            exit 1;
          fi

  generate:
    # go generate needs Terraform in the path, use latest version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v3
      - run: go generate ./...
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'go generate ./...' command and commit."; exit 1)

  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support jobs
        # run in parallel -- some tests create resources with specific IDs
        # which must be unique... some test resource randomization is needed
        # but doesn't exist... Currently only testing w/ 1.6 max-parallel: 1
        # should fix this!
        # Specific versions needed!
        # NOTE: required tests are configured in branch protection!
        #
        # https://releases.hashicorp.com/terraform/
        #
        terraform:
          - "1.13.5"
          - "1.14.7"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - env:
          # for the time being, only do unit tests, below needs to be changed
          # to secrets when used with the tunnel.sh script.
          # TF_ACC: "0"
          NGROK_URL: ${{ secrets.NGROK_URL }}
        run: |
          echo "setting env vars"
          echo "TF_VAR_address=https://localhost" >>$GITHUB_ENV
          if [ -n "$NGROK_URL" ]; then
            echo "TF_ACC=1" >> $GITHUB_ENV
            echo "TF_VAR_address=${NGROK_URL}" >> $GITHUB_ENV
          fi

      - env:
          TF_VAR_username: ${{ secrets.USERNAME }}
          TF_VAR_password: ${{ secrets.PASSWORD }}
          TF_VAR_token: ${{ secrets.TOKEN }}
          TF_ACC_TERRAFORM_VERSION: ${{ matrix.terraform }}
        run: go test -timeout 1h -race -v -covermode atomic -coverprofile=covprofile -coverpkg=./internal/... ./internal/...
        timeout-minutes: 60

      - name: Install goveralls
        run: go install github.com/mattn/goveralls@latest

      - name: Send coverage
        env:
          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goveralls -coverprofile=covprofile -service=github

      - name: Cleanup acceptance token cache
        if: ${{ always() }}
        run: rm -f /tmp/terraform-provider-cml2-acc-token.json
